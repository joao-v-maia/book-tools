
services:
###> app ###
  php:
    build:
      target: php-dev
    environment:
      APP_ENV: dev
      APP_DEBUG: "1"
      XDEBUG_MODE: "${XDEBUG_MODE:-off}"
    volumes:
      - .:/var/www/html:cached
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nginx:
    build:
      target: nginx-dev
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./public:/var/www/html/public:ro
###< app ###

###> doctrine/doctrine-bundle ###
  database:
    ports:
      - "${DATABASE_PORT:-5432}:5432"
###< doctrine/doctrine-bundle ###

###> symfony/mailer ###
  mailer:
    image: axllent/mailpit
    ports:
      - "1025"
      - "${MAILER_PORT:-8025}:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
###< symfony/mailer ###
